<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" aria-label="ESI Exata">
  <!-- Icon mark: stylized E circuit node -->
  <g transform="translate(0,4)">
    <!-- Main vertical bar -->
    <rect x="0" y="0" width="4" height="40" fill="#E21219"/>
    <!-- Top horizontal bar -->
    <rect x="0" y="0" width="24" height="4" fill="#E21219"/>
    <!-- Middle horizontal bar -->
    <rect x="0" y="18" width="18" height="4" fill="#E21219"/>
    <!-- Bottom horizontal bar -->
    <rect x="0" y="36" width="24" height="4" fill="#E21219"/>
    <!-- Circuit nodes -->
    <circle cx="24" cy="2" r="3" fill="#E21219"/>
    <circle cx="18" cy="20" r="3" fill="#1FA9E6"/>
    <circle cx="24" cy="38" r="3" fill="#E21219"/>
    <!-- Connector dot -->
    <circle cx="31" cy="20" r="2" fill="#1FA9E6" opacity="0.6"/>
    <line x1="24" y1="20" x2="35" y2="20" stroke="#1FA9E6" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Wordmark: ESI (dark on light) -->
  <text x="44" y="32" font-family="Sora, system-ui, sans-serif" font-weight="700" font-size="22" fill="#0d1117" letter-spacing="-0.5">ESI</text>
  <!-- Separator pipe -->
  <rect x="95" y="10" width="2" height="28" fill="#E21219" rx="1"/>
  <!-- Wordmark: exata -->
  <text x="103" y="32" font-family="Sora, system-ui, sans-serif" font-weight="300" font-size="22" fill="#0d1117" letter-spacing="1">exata</text>
</svg>
