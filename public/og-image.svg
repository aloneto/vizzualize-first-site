<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Circuit pattern overlay (simplified) -->
  <defs>
    <pattern id="circuit-bg" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="80" y2="20" stroke="#1FA9E6" stroke-width="0.6" opacity="0.12"/>
      <line x1="30" y1="0" x2="30" y2="80" stroke="#1FA9E6" stroke-width="0.6" opacity="0.12"/>
      <circle cx="30" cy="20" r="2" fill="#1FA9E6" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#circuit-bg)"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="#E21219"/>

  <!-- Logo mark (scaled up) -->
  <g transform="translate(80, 215) scale(3.5)">
    <rect x="0" y="0" width="4" height="40" fill="#E21219"/>
    <rect x="0" y="0" width="24" height="4" fill="#E21219"/>
    <rect x="0" y="18" width="18" height="4" fill="#1FA9E6"/>
    <rect x="0" y="36" width="24" height="4" fill="#E21219"/>
    <circle cx="24" cy="2" r="3" fill="#E21219"/>
    <circle cx="18" cy="20" r="3" fill="#1FA9E6"/>
    <circle cx="24" cy="38" r="3" fill="#E21219"/>
  </g>

  <!-- ESI wordmark -->
  <text x="240" y="295" font-family="Sora, system-ui, sans-serif" font-weight="700" font-size="88" fill="#FFFFFF" letter-spacing="-2">ESI</text>

  <!-- Pipe separator -->
  <rect x="415" y="220" width="5" height="100" fill="#E21219" rx="2"/>

  <!-- exata wordmark -->
  <text x="430" y="295" font-family="Sora, system-ui, sans-serif" font-weight="300" font-size="88" fill="#FFFFFF" letter-spacing="4">exata</text>

  <!-- Tagline -->
  <text x="240" y="355" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#1FA9E6" letter-spacing="5">TECNOLOGIA QUE TRANSFORMA</text>

  <!-- Sub-brand pills -->
  <g transform="translate(240, 400)">
    <!-- exata -->
    <rect x="0" y="0" width="90" height="28" rx="4" fill="#E21219" opacity="0.15"/>
    <rect x="0" y="0" width="90" height="28" rx="4" stroke="#E21219" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="45" y="19" font-family="Sora, system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">esi|exata</text>
    <!-- agro -->
    <rect x="102" y="0" width="82" height="28" rx="4" fill="#2D8B4E" opacity="0.15"/>
    <rect x="102" y="0" width="82" height="28" rx="4" stroke="#2D8B4E" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="143" y="19" font-family="Sora, system-ui, sans-serif" font-size="11" fill="#2D8B4E" text-anchor="middle" letter-spacing="0.5">esi|agro</text>
    <!-- p&d -->
    <rect x="196" y="0" width="72" height="28" rx="4" fill="#6B4BD9" opacity="0.15"/>
    <rect x="196" y="0" width="72" height="28" rx="4" stroke="#6B4BD9" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="232" y="19" font-family="Sora, system-ui, sans-serif" font-size="11" fill="#6B4BD9" text-anchor="middle" letter-spacing="0.5">esi|p&amp;d</text>
    <!-- store -->
    <rect x="280" y="0" width="84" height="28" rx="4" fill="#E85D24" opacity="0.15"/>
    <rect x="280" y="0" width="84" height="28" rx="4" stroke="#E85D24" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="322" y="19" font-family="Sora, system-ui, sans-serif" font-size="11" fill="#E85D24" text-anchor="middle" letter-spacing="0.5">esi|store</text>
  </g>

  <!-- Domain -->
  <text x="960" y="590" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="18" fill="#FFFFFF" opacity="0.35" text-anchor="end" letter-spacing="1">esiexata.com.br</text>
</svg>
