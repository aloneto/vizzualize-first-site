<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-hidden="true">
  <defs>
    <pattern id="circuit" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Horizontal traces -->
      <line x1="0" y1="20" x2="25" y2="20" stroke="#1FA9E6" stroke-width="0.8" opacity="0.25"/>
      <line x1="35" y1="20" x2="80" y2="20" stroke="#1FA9E6" stroke-width="0.8" opacity="0.25"/>
      <line x1="0" y1="60" x2="20" y2="60" stroke="#1FA9E6" stroke-width="0.8" opacity="0.15"/>
      <line x1="55" y1="60" x2="80" y2="60" stroke="#1FA9E6" stroke-width="0.8" opacity="0.15"/>
      <!-- Vertical traces -->
      <line x1="30" y1="0" x2="30" y2="15" stroke="#1FA9E6" stroke-width="0.8" opacity="0.25"/>
      <line x1="30" y1="25" x2="30" y2="55" stroke="#1FA9E6" stroke-width="0.8" opacity="0.25"/>
      <line x1="30" y1="65" x2="30" y2="80" stroke="#1FA9E6" stroke-width="0.8" opacity="0.25"/>
      <line x1="60" y1="0" x2="60" y2="40" stroke="#1FA9E6" stroke-width="0.8" opacity="0.15"/>
      <line x1="60" y1="50" x2="60" y2="80" stroke="#1FA9E6" stroke-width="0.8" opacity="0.15"/>
      <!-- Nodes / solder points -->
      <circle cx="30" cy="20" r="2.5" fill="#1FA9E6" opacity="0.3"/>
      <circle cx="30" cy="60" r="2" fill="#E21219" opacity="0.25"/>
      <circle cx="60" cy="45" r="2.5" fill="#1FA9E6" opacity="0.2"/>
      <circle cx="15" cy="40" r="1.5" fill="#1FA9E6" opacity="0.2"/>
      <!-- Corner pads -->
      <circle cx="0" cy="0" r="1.5" fill="#1FA9E6" opacity="0.15"/>
      <circle cx="80" cy="0" r="1.5" fill="#1FA9E6" opacity="0.15"/>
      <circle cx="0" cy="80" r="1.5" fill="#1FA9E6" opacity="0.15"/>
      <circle cx="80" cy="80" r="1.5" fill="#1FA9E6" opacity="0.15"/>
      <!-- L-bend connector -->
      <polyline points="15,40 15,60 25,60" stroke="#1FA9E6" stroke-width="0.8" opacity="0.2" fill="none"/>
      <!-- Component outline (resistor hint) -->
      <rect x="45" y="17" width="14" height="6" rx="1" stroke="#1FA9E6" stroke-width="0.7" opacity="0.2" fill="none"/>
      <line x1="45" y1="20" x2="42" y2="20" stroke="#1FA9E6" stroke-width="0.7" opacity="0.2"/>
      <line x1="59" y1="20" x2="62" y2="20" stroke="#1FA9E6" stroke-width="0.7" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#circuit)"/>
</svg>
