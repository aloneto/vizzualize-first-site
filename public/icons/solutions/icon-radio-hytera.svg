<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Rádio Hytera">
  <!-- Radio body -->
  <rect x="7" y="4" width="10" height="16" rx="2"/>
  <!-- Antenna -->
  <line x1="12" y1="4" x2="12" y2="1"/>
  <!-- Speaker grille -->
  <line x1="9" y1="12" x2="15" y2="12"/>
  <line x1="9" y1="14" x2="15" y2="14"/>
  <line x1="9" y1="16" x2="15" y2="16"/>
  <!-- PTT button -->
  <rect x="9" y="7" width="6" height="3" rx="1" fill="currentColor" stroke="none" opacity="0.3"/>
  <!-- Signal waves -->
  <path d="M3 8c1-2 2.5-3 4-3" opacity="0.5"/>
  <path d="M21 8c-1-2-2.5-3-4-3" opacity="0.5"/>
</svg>
