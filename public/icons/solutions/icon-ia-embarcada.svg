<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="IA Embarcada">
  <!-- CPU/Chip body -->
  <rect x="7" y="7" width="10" height="10" rx="1"/>
  <!-- Inner grid (neural net) -->
  <line x1="10" y1="7" x2="10" y2="17"/>
  <line x1="14" y1="7" x2="14" y2="17"/>
  <line x1="7" y1="10" x2="17" y2="10"/>
  <line x1="7" y1="14" x2="17" y2="14"/>
  <!-- Pins left -->
  <line x1="4" y1="9" x2="7" y2="9"/>
  <line x1="4" y1="12" x2="7" y2="12"/>
  <line x1="4" y1="15" x2="7" y2="15"/>
  <!-- Pins right -->
  <line x1="17" y1="9" x2="20" y2="9"/>
  <line x1="17" y1="12" x2="20" y2="12"/>
  <line x1="17" y1="15" x2="20" y2="15"/>
  <!-- Pins top -->
  <line x1="9" y1="4" x2="9" y2="7"/>
  <line x1="12" y1="4" x2="12" y2="7"/>
  <line x1="15" y1="4" x2="15" y2="7"/>
  <!-- Pins bottom -->
  <line x1="9" y1="17" x2="9" y2="20"/>
  <line x1="12" y1="17" x2="12" y2="20"/>
  <line x1="15" y1="17" x2="15" y2="20"/>
</svg>
